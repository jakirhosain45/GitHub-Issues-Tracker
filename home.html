<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home page</title>
    <!-- tailwind -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome cdn -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-[#F8FAFC]">
    <header>
        <nav class="bg-white shadow md:flex lg:flex justify-between items-center lg:px-14 py-8 space-y-3 px-2">
            <div class="flex items-center">
                <img class="w-8" src="./img/github-logo.png" alt="">
                <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>
            </div>
            <div class="flex items-center gap-2">
                <label class="input">
  <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <g
      stroke-linejoin="round"
      stroke-linecap="round"
      stroke-width="2.5"
      fill="none"
      stroke="currentColor"
    >
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.3-4.3"></path>
    </g>
  </svg>
  <input type="search" required placeholder="Search" />
</label>
<button class="btn bg-[#4A00FF] font-bold text-white">+ new Issue </button>
            </div>
        </nav>
    </header>
    <main class="container mx-auto">
        <section>
            <div class="bg-white mt-12 rounded-md py-6 px-3 shadow-md">
                <button class="bg-[#4A00FF] text-white btn lg:px-10 text-xl">all</button>
                <button class="  btn lg:px-10 text-xl">Open</button>
                <button class=" btn lg:px-10 text-xl">Closed</button>
            </div>
        </section>

        <section class="bg-[#F8FAFC] rounded-md shadow-md my-6">
            <div class="bg-white flex justify-between rounded-t-md shadow  p-5">
                <div class="flex items-center gap-2">
                    <img class="bg-[#ECE4FF] p-2 rounded-full" src="./img/Aperture.png" alt="">
                    <div>
                        <h3 class="text-xl font-semibold">50 Issues</h3>
                        <p class="text-gray-400">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex gap-3 items-center ">
                    <div class="flex gap-1 items-center">
                        <h1 class="bg-[#00A96E] rounded-full w-3 h-3 "></h1>
                        <h2 class="font-bold">Open</h2>
                    </div>
                    <div class="flex gap-1 items-center">
                        <h1 class="bg-[#A855F7] rounded-full w-3 h-3 "></h1>
                        <h2 class="font-bold">Closed</h2>
                    </div>
                </div>
            </div>
            <!-- card container -->
            <div id="cardContainer" class="p-5 grid md:grid-cols-2 lg:grid-cols-3">
                <div class="bg-white rounded-md p-3 border-t-2 space-y-2 shadow-md">
                    <div class="flex items-center justify-between">
                        <img class="w-10" src="./img/Open-Status.png" alt="">
                        <h2 class="bg-red-100 px-5 py-2 rounded-full font-semibold text-red-600">HIGH</h2>
                    </div>
                    <h1 class="text-xl font-bold">Fix navigation menu on mobile devices</h1>
                    <p class="text-gray-400">The navigation menu doesn't collapse properly on mobile devices...</p>
                    <div class="flex items-center gap-2 pb-2">
                        <button class="p-2 rounded-2xl bg-red-100 text-red-500 font-semibold">BUG</button>
                        <button class="p-2 rounded-2xl bg-[#FDE68A] text-[#D97706] font-semibold">HELP WANTED</button>
                    </div>

                    <hr class="text-gray-300 py-2">
                    <p class="text-gray-400">#1by john_doe</p>
                    <p class="text-gray-400">1/15/2024</p>
                </div>
            </div>
        </section>
    </main>
    <footer>

    </footer>
</body>
</html>
